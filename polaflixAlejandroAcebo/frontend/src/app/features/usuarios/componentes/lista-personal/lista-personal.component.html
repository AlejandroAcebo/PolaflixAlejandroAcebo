<section class="personal-list">
  <header class="list-header">
    <h2>{{ title }}</h2>
    <span>{{ items.length }}</span>
  </header>

  <app-empty-state
    *ngIf="items.length === 0"
    title="Sin series"
    text="No hay series en esta lista."
  ></app-empty-state>

  <ul *ngIf="items.length > 0">
    <li *ngFor="let item of items">
      <a [routerLink]="['/series', item.idSerie]" class="serie-link">
        <span class="poster" aria-hidden="true">{{ item.nombreSerie.charAt(0) }}</span>

        <span class="serie-copy">
          <span class="serie-title">{{ item.nombreSerie }}</span>
          <span class="serie-meta">{{ metaText(item) }}</span>
        </span>
      </a>

      <div *ngIf="showProgress" class="serie-progress" aria-label="Progreso de visualizacion">
        <div class="progress-top">
          <span>{{ progress(item) }}%</span>
          <small>{{ stateLabel(item) }}</small>
        </div>
        <div class="progress-track">
          <span [style.width.%]="progress(item)"></span>
        </div>
      </div>
    </li>
  </ul>
</section>

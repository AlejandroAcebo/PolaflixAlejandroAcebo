<section class="season">
  <header>
    <h2>{{ temporada.nombreTemporada }}</h2>
    <span>{{ temporada.capitulos.length }} capitulos</span>
  </header>

  <app-empty-state
    *ngIf="temporada.capitulos.length === 0"
    title="Sin capitulos"
    text="Esta temporada todavia no tiene capitulos disponibles."
  ></app-empty-state>

  <div *ngIf="temporada.capitulos.length > 0" class="episodes">
    <app-episode-item
      *ngFor="let capitulo of temporada.capitulos"
      [capitulo]="capitulo"
      [saving]="savingEpisodeId === capitulo.idCapitulo"
      (markAsViewed)="markEpisodeAsViewed.emit($event)"
    ></app-episode-item>
  </div>
</section>

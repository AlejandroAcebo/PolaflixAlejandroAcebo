<section class="page">
  <a class="back-link" routerLink="/usuario">Volver al inicio</a>

  <ng-container *ngIf="state$ | async as state">
    <app-loading-state *ngIf="state.status === 'loading'" message="Cargando serie..."></app-loading-state>

    <app-error-alert
      *ngIf="state.status === 'error'"
      [message]="state.message"
    ></app-error-alert>

    <ng-container *ngIf="state.status === 'success'">
      <header class="detail-header">
        <h1>{{ state.view.serie.nombreSerie }}</h1>
        <span class="badge">{{ state.view.serie.tipoSerie }}</span>
      </header>

      <app-error-alert
        *ngIf="actionError$ | async as actionError"
        [message]="actionError"
      ></app-error-alert>

      <app-empty-state
        *ngIf="state.view.temporadas.length === 0"
        title="Sin temporadas"
        text="Esta serie todavia no tiene temporadas registradas."
      ></app-empty-state>

      <ng-container *ngIf="{ index: selectedSeasonIndex$ | async } as selected">
        <div *ngIf="state.view.temporadas.length > 0" class="season-toolbar">
          <label for="season-selector">Temporada</label>
          <select
            id="season-selector"
            [value]="selected.index ?? 0"
            (change)="selectSeason(seasonSelector.value)"
            #seasonSelector
          >
            <option
              *ngFor="let temporada of state.view.temporadas; let index = index"
              [value]="index"
            >
              {{ temporada.nombreTemporada }}
            </option>
          </select>
        </div>

        <div *ngIf="selectedSeason(state.view.temporadas, selected.index ?? 0) as temporada" class="seasons">
          <app-season-section
            [temporada]="temporada"
            [savingEpisodeId]="savingEpisodeId$ | async"
            (markEpisodeAsViewed)="markAsViewed($event)"
          ></app-season-section>
        </div>
      </ng-container>
    </ng-container>
  </ng-container>
</section>
